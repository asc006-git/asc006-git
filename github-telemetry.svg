<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" width="850" height="480">
  <defs>
    <!-- Dark Tech Grid Pattern -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#00ff66" stroke-width="0.7" stroke-opacity="0.06" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow Filter for secondary paths -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Laser Scan Gradient -->
    <linearGradient id="scan-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0" />
      <stop offset="15%" stop-color="#00ff66" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#00ff66" stop-opacity="0.7" />
      <stop offset="85%" stop-color="#00ff66" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    /* CSS Stylesheets and Animations */
    @keyframes scan {
      0% { transform: translateY(120px); opacity: 0; }
      5% { opacity: 0.8; }
      95% { opacity: 0.8; }
      100% { transform: translateY(440px); opacity: 0; }
    }

    @keyframes pulse-ring {
      0% { r: 5px; opacity: 1; }
      100% { r: 11px; opacity: 0; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes flow-trace {
      0% { stroke-dashoffset: 120; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes fill-progress {
      from { width: 0; }
    }

    .bg-main {
      fill: #06080b;
    }

    .grid-overlay {
      fill: url(#grid);
    }

    .glowing-text {
      fill: #00ff66;
      text-shadow: 0 0 6px rgba(0, 255, 102, 0.7);
    }

    .glowing-border {
      stroke: #00ff66;
      stroke-opacity: 0.8;
      filter: url(#neon-glow);
    }

    .pulse-dot {
      animation: blink 2s infinite ease-in-out;
    }

    .pulse-glow-ring {
      animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
    }

    .pcb-circuit {
      stroke: #00ff66;
      stroke-dasharray: 10 15;
      animation: flow-trace 6s linear infinite;
    }

    .lang-bar {
      animation: fill-progress 1.5s cubic-bezier(0.1, 1, 0.1, 1) forwards;
    }

    .label-mute {
      fill: #627280;
    }

    .tech-panel {
      fill: #090e12;
      fill-opacity: 0.8;
      stroke: #00ff66;
      stroke-opacity: 0.15;
    }
  </style>

  <!-- Background Base -->
  <rect width="850" height="480" class="bg-main" rx="12" />
  <rect width="850" height="480" class="grid-overlay" rx="12" />

  <!-- PCB Circuit Trace Background Decorations -->
  <g fill="none" stroke-opacity="0.2" stroke-width="1.5">
    <!-- Top-Left Corner Trace -->
    <path d="M 15 80 L 15 25 L 80 25" stroke="#00ff66" />
    <circle cx="80" cy="25" r="2.5" fill="#00ff66" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.4" />
    <path d="M 25 15 L 140 15 M 140 15 L 160 35 L 200 35" stroke="#00ff66" class="pcb-circuit" />
    <circle cx="200" cy="35" r="2" fill="#00ff66" fill-opacity="0.3" stroke="#00ff66" stroke-opacity="0.3" />

    <!-- Bottom-Right Corner Trace -->
    <path d="M 835 400 L 835 455 L 770 455" stroke="#00ff66" />
    <circle cx="770" cy="455" r="2.5" fill="#00ff66" fill-opacity="0.4" stroke="#00ff66" stroke-opacity="0.4" />
    <path d="M 825 465 L 710 465 L 690 445 L 650 445" stroke="#00ff66" class="pcb-circuit" />
    <circle cx="650" cy="445" r="2" fill="#00ff66" fill-opacity="0.3" stroke="#00ff66" stroke-opacity="0.3" />
  </g>

  <!-- Outer Dashboard Border (Chamfered Cyberpunk Panel Outline) -->
  <path d="M 25 10 L 825 10 L 840 25 L 840 455 L 825 470 L 25 470 L 10 455 L 10 25 Z" 
        fill="none" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1.5" />
  
  <!-- Outer glowing accent corners -->
  <path d="M 10 50 L 10 25 L 25 10 L 50 10" fill="none" class="glowing-border" stroke-width="2" />
  <path d="M 840 50 L 840 25 L 825 10 L 800 10" fill="none" class="glowing-border" stroke-width="2" />
  <path d="M 10 430 L 10 455 L 25 470 L 50 470" fill="none" class="glowing-border" stroke-width="2" />
  <path d="M 840 430 L 840 455 L 825 470 L 800 470" fill="none" class="glowing-border" stroke-width="2" />

  <!-- ================= HEADER SECTION ================= -->
  <g transform="translate(0, 0)">
    <!-- Pulsing online status indicator -->
    <circle cx="45" cy="48" r="5" fill="#00ff66" class="pulse-dot" />
    <circle cx="45" cy="48" r="5" stroke="#00ff66" stroke-width="1.5" fill="none" class="pulse-glow-ring" />
    
    <!-- Status Labels -->
    <text x="65" y="52" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="bold" fill="#00ff66" class="glowing-text">SYS.TELEMETRY // ONLINE</text>
    <text x="805" y="52" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" fill="#00ff66" fill-opacity="0.6" text-anchor="end">API_LEVEL: V4.GRAPHQL // SECURE</text>

    <!-- Large Identity Title -->
    <text x="40" y="90" font-family="'SFMono-Regular', Consolas, monospace" font-size="26" font-weight="bold" fill="#ffffff">IDENTITY: ADHYATMA SINGH CHAUHAN</text>
    <text x="40" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" fill="#627280">HOST_NODE: github.com/asc006-git // STATUS: ACTIVE</text>

    <!-- Horizontal dividing rule -->
    <line x1="12" y1="120" x2="838" y2="120" stroke="#00ff66" stroke-opacity="0.3" stroke-width="1" />
    <polygon points="410,120 422,128 438,128 450,120" fill="#06080b" stroke="#00ff66" stroke-opacity="0.5" stroke-width="1" />
    <text x="430" y="126" font-family="'SFMono-Regular', Consolas, monospace" font-size="7" fill="#00ff66" text-anchor="middle" fill-opacity="0.8">CORE_CTRL</text>
  </g>

  <!-- ================= DATAPANEL 1: REPOSITORIES & STARS ================= -->
  <g transform="translate(35, 140)">
    <rect width="240" height="180" rx="6" class="tech-panel" />
    <!-- Panel border decoration -->
    <path d="M 0 25 L 0 0 L 25 0" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 215 0 L 240 0 L 240 25" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 0 155 L 0 180 L 25 180" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 215 180 L 240 180 L 240 155" fill="none" stroke="#00ff66" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="15" y="22" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="bold" fill="#00ff66">[01 // CORE TELEMETRY]</text>

    <!-- Repositories Count -->
    <!-- Icon: Folder -->
    <path d="M 20 45 L 26 45 L 29 48 L 40 48 L 40 58 L 20 58 Z" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="47" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">TOTAL REPOSITORIES</text>
    <text x="50" y="66" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">11</text>

    <!-- Stars Count -->
    <!-- Icon: Star -->
    <polygon points="30,86 32,91 38,91 33,95 35,100 30,97 25,100 27,95 22,91 28,91" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="89" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">STARS ACCUMULATED</text>
    <text x="50" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">0</text>

    <!-- Followers -->
    <!-- Icon: User -->
    <circle cx="30" cy="129" r="4.5" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 22 142 A 8 8 0 0 1 38 142" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="131" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">NET FOLLOWERS</text>
    <text x="50" y="150" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">1</text>
  </g>

  <!-- ================= DATAPANEL 2: USER ACTIVITY ================= -->
  <g transform="translate(295, 140)">
    <rect width="260" height="180" rx="6" class="tech-panel" />
    <!-- Panel border decoration -->
    <path d="M 0 25 L 0 0 L 25 0" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 235 0 L 260 0 L 260 25" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 0 155 L 0 180 L 25 180" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 235 180 L 260 180 L 260 155" fill="none" stroke="#00ff66" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="15" y="22" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="bold" fill="#00ff66">[02 // USER ACTIVITY]</text>

    <!-- Commits Count -->
    <!-- Icon: Commit -->
    <circle cx="30" cy="53" r="4" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <line x1="18" y1="53" x2="26" y2="53" stroke="#00ff66" stroke-width="1.5" />
    <line x1="34" y1="53" x2="42" y2="53" stroke="#00ff66" stroke-width="1.5" />
    <text x="52" y="47" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">COMMITS RECORDED</text>
    <text x="52" y="66" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">418</text>

    <!-- Pull Requests -->
    <!-- Icon: Pull Request -->
    <circle cx="26" cy="91" r="2.5" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <circle cx="38" cy="101" r="2.5" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <circle cx="26" cy="101" r="2.5" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <line x1="26" y1="93.5" x2="26" y2="98.5" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 38 98.5 C 38 95, 26 95, 26 95" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <text x="52" y="89" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">PULL REQUESTS MERGED</text>
    <text x="52" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">5</text>

    <!-- Issues -->
    <!-- Icon: Issue -->
    <circle cx="30" cy="139" r="6" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <circle cx="30" cy="136" r="0.8" fill="#00ff66" />
    <line x1="30" y1="138.5" x2="30" y2="142.5" stroke="#00ff66" stroke-width="1.5" />
    <text x="52" y="131" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">ISSUES COMPLETED</text>
    <text x="52" y="150" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">0</text>
  </g>

  <!-- ================= DATAPANEL 3: STREAK CALIBRATION ================= -->
  <g transform="translate(575, 140)">
    <rect width="240" height="180" rx="6" class="tech-panel" />
    <!-- Panel border decoration -->
    <path d="M 0 25 L 0 0 L 25 0" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 215 0 L 240 0 L 240 25" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 0 155 L 0 180 L 25 180" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 215 180 L 240 180 L 240 155" fill="none" stroke="#00ff66" stroke-width="1.5" />
    
    <!-- Title -->
    <text x="15" y="22" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="bold" fill="#00ff66">[03 // STREAK CALIBRATION]</text>

    <!-- Current Streak -->
    <!-- Icon: Flame -->
    <path d="M 30 50 Q 33 40 38 43 Q 43 46 43 56 Q 43 60 35 60 Q 27 60 30 50 Z" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="47" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">CURRENT STREAK</text>
    <text x="50" y="66" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">13 DAYS</text>

    <!-- Longest Streak -->
    <!-- Icon: Trophy -->
    <path d="M 25 86 H 35 V 93 H 25 Z" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 23 82 H 37 V 86 H 23 Z" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <line x1="30" y1="93" x2="30" y2="98" stroke="#00ff66" stroke-width="1.5" />
    <line x1="26" y1="98" x2="34" y2="98" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="89" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">LONGEST STREAK</text>
    <text x="50" y="108" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">29 DAYS</text>

    <!-- Total Year contributions -->
    <!-- Icon: Calendar -->
    <rect x="25" y="129" width="10" height="10" rx="1.5" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <line x1="28" y1="127" x2="28" y2="129" stroke="#00ff66" stroke-width="1.5" />
    <line x1="32" y1="127" x2="32" y2="129" stroke="#00ff66" stroke-width="1.5" />
    <text x="50" y="131" font-family="'SFMono-Regular', Consolas, monospace" font-size="9" class="label-mute">TOTAL YTD CONTRIBS</text>
    <text x="50" y="150" font-family="'SFMono-Regular', Consolas, monospace" font-size="18" font-weight="bold" fill="#00ff66" class="glowing-text">431</text>
  </g>

  <!-- ================= DATAPANEL 4: LANGUAGES ================= -->
  <g transform="translate(35, 340)">
    <rect width="780" height="85" rx="6" class="tech-panel" />
    <!-- Panel border decoration -->
    <path d="M 0 20 L 0 0 L 20 0" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 760 0 L 780 0 L 780 20" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 0 65 L 0 85 L 20 85" fill="none" stroke="#00ff66" stroke-width="1.5" />
    <path d="M 760 85 L 780 85 L 780 65" fill="none" stroke="#00ff66" stroke-width="1.5" />

    <!-- Title -->
    <text x="15" y="20" font-family="'SFMono-Regular', Consolas, monospace" font-size="11" font-weight="bold" fill="#00ff66">[04 // PRIMARY LANGUAGE SYSTEM]</text>

    <!-- Language Items (X Spaced Columns) -->
    <g transform="translate(0, 0)">
      
      <!-- Lang 1: Python -->
      <g transform="translate(40, 0)">
        <text x="0" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#ffffff">Python</text>
        <text x="130" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#00ff66" text-anchor="end">95.7%</text>
        <rect x="0" y="53" width="130" height="5" rx="2.5" fill="#112217" />
        <rect x="0" y="53" width="124.4" height="5" rx="2.5" fill="#3572A5" class="lang-bar" />
      </g>
      <!-- Lang 2: TypeScript -->
      <g transform="translate(195, 0)">
        <text x="0" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#ffffff">TypeScript</text>
        <text x="130" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#00ff66" text-anchor="end">3.4%</text>
        <rect x="0" y="53" width="130" height="5" rx="2.5" fill="#112217" />
        <rect x="0" y="53" width="4.4" height="5" rx="2.5" fill="#3178c6" class="lang-bar" />
      </g>
      <!-- Lang 3: JavaScript -->
      <g transform="translate(350, 0)">
        <text x="0" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#ffffff">JavaScript</text>
        <text x="130" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#00ff66" text-anchor="end">0.3%</text>
        <rect x="0" y="53" width="130" height="5" rx="2.5" fill="#112217" />
        <rect x="0" y="53" width="0.4" height="5" rx="2.5" fill="#f1e05a" class="lang-bar" />
      </g>
      <!-- Lang 4: C -->
      <g transform="translate(505, 0)">
        <text x="0" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#ffffff">C</text>
        <text x="130" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#00ff66" text-anchor="end">0.2%</text>
        <rect x="0" y="53" width="130" height="5" rx="2.5" fill="#112217" />
        <rect x="0" y="53" width="0.3" height="5" rx="2.5" fill="#555555" class="lang-bar" />
      </g>
      <!-- Lang 5: CSS -->
      <g transform="translate(660, 0)">
        <text x="0" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#ffffff">CSS</text>
        <text x="130" y="45" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" font-weight="bold" fill="#00ff66" text-anchor="end">0.1%</text>
        <rect x="0" y="53" width="130" height="5" rx="2.5" fill="#112217" />
        <rect x="0" y="53" width="0.1" height="5" rx="2.5" fill="#663399" class="lang-bar" />
      </g>
    </g>
  </g>

  <!-- ================= FOOTER / STATUS BAR ================= -->
  <g>
    <!-- Scanning Laser Sweep Line -->
    <line x1="12" y1="0" x2="838" y2="0" stroke="url(#scan-gradient)" stroke-width="2.5" class="scan-line" />
    
    <!-- Footer Labels -->
    <text x="40" y="455" font-family="'SFMono-Regular', Consolas, monospace" font-size="8" fill="#00ff66" fill-opacity="0.5">TELEMETRY_LINK: ONLINE // ENCRYPT_HASH: SHA256_ACTIVE</text>
    <text x="810" y="455" font-family="'SFMono-Regular', Consolas, monospace" font-size="8" fill="#00ff66" fill-opacity="0.5" text-anchor="end">SYS.TIME: 2026-06-29 12:39:33 UTC // AUTOSYNC: +24H</text>
  </g>
</svg>