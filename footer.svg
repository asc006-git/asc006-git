<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 140" width="850" height="140">
<defs>
  <linearGradient id="ftBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#040506"/>
    <stop offset="50%" stop-color="#081312"/>
    <stop offset="100%" stop-color="#0A1E17"/>
  </linearGradient>
  <filter id="ftGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<style>
  @keyframes ftBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes ftFlow{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
  .ftCursor{animation:ftBlink 1s step-end infinite}
  .ftTrace{stroke:#00FF88;stroke-opacity:0.15;stroke-dasharray:6 10;animation:ftFlow 5s linear infinite;fill:none;stroke-width:1}
  .ftCode{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;fill:#7CFF5E}
  .ftComment{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;fill:#3A5E48}
  .ftKeyword{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;fill:#C8FFA0}
  .ftMethod{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;fill:#E9FFD7}
  .ftLineNo{font-family:'SFMono-Regular',Consolas,monospace;font-size:9px;fill:#2A4035}
  .ftPanel{fill:#0A0E0C;fill-opacity:0.95;stroke:#00FF88;stroke-opacity:0.1;stroke-width:1;rx:6}
  .ftDot{fill:#3A5E48}
  .ftMute{font-family:'SFMono-Regular',Consolas,monospace;fill:#2A4035}
</style>

<!-- Background -->
<rect width="850" height="140" fill="url(#ftBg)" rx="8"/>

<!-- PCB Traces -->
<g fill="none">
  <path d="M 0 130 L 120 130 L 140 110 L 250 110" class="ftTrace"/>
  <path d="M 850 130 L 730 130 L 710 110 L 600 110" class="ftTrace"/>
  <circle cx="250" cy="110" r="1.5" fill="#00FF88" fill-opacity="0.2"/>
  <circle cx="600" cy="110" r="1.5" fill="#00FF88" fill-opacity="0.2"/>
</g>

<!-- Terminal Panel -->
<rect x="150" y="10" width="550" height="105" class="ftPanel"/>

<!-- Terminal Chrome -->
<circle cx="170" cy="24" r="4" class="ftDot" fill-opacity="0.5"/>
<circle cx="182" cy="24" r="4" class="ftDot" fill-opacity="0.4"/>
<circle cx="194" cy="24" r="4" class="ftDot" fill-opacity="0.3"/>
<text x="425" y="28" font-family="'SFMono-Regular',Consolas,monospace" font-size="9" fill="#3A5E48" text-anchor="middle">Developer.java</text>
<line x1="155" y1="35" x2="695" y2="35" stroke="#00FF88" stroke-opacity="0.08"/>

<!-- Code Lines -->
<text x="165" y="52" class="ftLineNo">1</text>
<text x="185" y="52" class="ftKeyword">while</text><text x="218" y="52" class="ftCode"> (alive) {</text>

<text x="165" y="67" class="ftLineNo">2</text>
<text x="185" y="67" class="ftMethod">    eat</text><text x="210" y="67" class="ftCode">();</text>
<text x="250" y="67" class="ftMethod">code</text><text x="280" y="67" class="ftCode">();</text>
<text x="310" y="67" class="ftMethod">sleep</text><text x="345" y="67" class="ftCode">();</text>
<text x="375" y="67" class="ftMethod">repeat</text><text x="415" y="67" class="ftCode">();</text>

<text x="165" y="82" class="ftLineNo">3</text>
<text x="185" y="82" class="ftCode">}// Currently exploring agentic AI and model evaluation, and looking to </text>

<text x="165" y="100" class="ftLineNo">4</text>
<text x="185" y="100" class="ftComment">//contribute more to open source. Always up for a CP problem or an AI/ML discussion.✦</text>
<rect x="465" y="90" width="7" height="14" fill="#7CFF5E" fill-opacity="0.7" class="ftCursor"/>

<!-- Footer Status -->
<text x="425" y="132" font-family="'SFMono-Regular',Consolas,monospace" font-size="8" fill="#2A4035" text-anchor="middle">PROCESS_EXIT: 0 // SESSION_TERMINATED_GRACEFULLY // BUILT_WITH_☕_AND_PASSION</text>
</svg>
